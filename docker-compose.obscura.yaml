# Firecrawl + obscura (lightweight headless browser) override
#
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.obscura.yaml up -d
#
# obscura is an experimental browser engine (~30MB, ~512MB RAM at steady state).
# It does NOT execute JavaScript from <script> tags and does not implement the
# full Chrome DevTools Protocol. It runs alongside the existing Chromium
# playwright-service, not in place of it. Traffic is split via the
# RENDER_BACKEND_ORDER env var on playwright-service.
#
# If obscura fails a scrape, playwright-service transparently falls back to
# its own Chromium instance.

services:
  obscura:
    build:
      context: ./obscura
      dockerfile: Dockerfile
    image: firecrawl/obscura:local
    networks:
      - firecrawl-net
    environment:
      OBSCURA_CDP_SECRET: ${OBSCURA_CDP_SECRET:?err}
    command: >
      serve --port 9222 --host 0.0.0.0 --stealth --cdp-secret "${OBSCURA_CDP_SECRET}"
    cpus: 2.0
    mem_limit: 512M
    memswap_limit: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9222/json/version?cdp-secret=${OBSCURA_CDP_SECRET} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    volumes:
      - obscura-cache:/root/.cache

  playwright-service:
    environment:
      OBSCURA_CDP_URL: "ws://obscura:9222"
      OBSCURA_CDP_SECRET: ${OBSCURA_CDP_SECRET:?err}
      RENDER_BACKEND_ORDER: ${RENDER_BACKEND_ORDER:-obscura,chromium}

  api:
    depends_on:
      obscura:
        condition: service_healthy

volumes:
  obscura-cache:
